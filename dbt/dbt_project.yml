name: 'precision_cagr'
version: '1.0.0'
config-version: 2

profile: 'precision_cagr'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  env_name: ""

# on-run-start hooks removed: database, schemas, CPI_CONFIG table, and
# GET_CPI_CONFIG function are now managed declaratively by DCM.
# See dcm/sources/definitions/infrastructure.sql

seeds:
  precision_cagr:
    +database: "{% if var('env_name', '') != '' %}PRECISION_{{ var('env_name') }}{% else %}PRECISION{% endif %}"
    +schema: RAW

models:
  precision_cagr:
    +database: "{% if var('env_name', '') != '' %}PRECISION_{{ var('env_name') }}{% else %}PRECISION{% endif %}"
    staging:
      +schema: ODS
    marts:
      +schema: FINANCE_CURATED
