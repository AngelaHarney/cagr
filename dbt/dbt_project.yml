name: 'precision_cagr'
version: '1.0.0'
config-version: 2

profile: 'precision_cagr'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

on-run-start:
  - >
    CREATE SCHEMA IF NOT EXISTS PRECISION.RAW
  - >
    CREATE SCHEMA IF NOT EXISTS PRECISION.ODS
  - >
    CREATE SCHEMA IF NOT EXISTS PRECISION.ANALYTICS
  - >
    CREATE SCHEMA IF NOT EXISTS PRECISION.FINANCE_CURATED
  - >
    CREATE TABLE IF NOT EXISTS PRECISION.RAW.CPI_CONFIG
    (config_key VARCHAR, default_value VARCHAR, override_value VARCHAR, override_until_date DATE)
  - >
    CREATE OR REPLACE FUNCTION PRECISION.RAW.GET_CPI_CONFIG(p_config_key VARCHAR)
    RETURNS FLOAT
    LANGUAGE SQL
    AS
    $$
      SELECT
        CASE
          WHEN override_value IS NOT NULL AND override_until_date >= CURRENT_DATE()
            THEN override_value::FLOAT
          ELSE default_value::FLOAT
        END
      FROM PRECISION.RAW.CPI_CONFIG
      WHERE config_key = p_config_key
      LIMIT 1
    $$

seeds:
  precision_cagr:
    +schema: RAW

models:
  precision_cagr:
    staging:
      +schema: ODS
    marts:
      +schema: FINANCE_CURATED
