name: 'precision_cagr'
version: '1.0.0'
config-version: 2

profile: 'precision_cagr'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  env_name: ""

on-run-start:
  - >
    CREATE DATABASE IF NOT EXISTS {{ get_db_name() }}
  - >
    CREATE SCHEMA IF NOT EXISTS {{ get_db_name() }}.RAW
  - >
    CREATE SCHEMA IF NOT EXISTS {{ get_db_name() }}.ODS
  - >
    CREATE SCHEMA IF NOT EXISTS {{ get_db_name() }}.ANALYTICS
  - >
    CREATE SCHEMA IF NOT EXISTS {{ get_db_name() }}.FINANCE_CURATED
  - >
    CREATE TABLE IF NOT EXISTS {{ get_db_name() }}.RAW.CPI_CONFIG
    (config_key VARCHAR, default_value VARCHAR, override_value VARCHAR, override_until_date DATE)
  - >
    CREATE OR REPLACE FUNCTION {{ get_db_name() }}.RAW.GET_CPI_CONFIG(p_config_key VARCHAR)
    RETURNS FLOAT
    LANGUAGE SQL
    AS
    $$
      SELECT
        CASE
          WHEN override_value IS NOT NULL AND override_until_date >= CURRENT_DATE()
            THEN override_value::FLOAT
          ELSE default_value::FLOAT
        END
      FROM IDENTIFIER('{{ get_db_name() }}.RAW.CPI_CONFIG')
      WHERE config_key = p_config_key
      LIMIT 1
    $$

seeds:
  precision_cagr:
    +database: "{% if var('env_name', '') != '' %}PRECISION_{{ var('env_name') }}{% else %}PRECISION{% endif %}"
    +schema: RAW

models:
  precision_cagr:
    +database: "{% if var('env_name', '') != '' %}PRECISION_{{ var('env_name') }}{% else %}PRECISION{% endif %}"
    staging:
      +schema: ODS
    marts:
      +schema: FINANCE_CURATED
