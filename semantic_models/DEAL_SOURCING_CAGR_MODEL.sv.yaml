verified_queries:
  - name: "sale_leaseback_above_6pct_cagr"
    sql: "SELECT PROPERTY_NAME, PROPERTY_TYPE, CURRENT_CAGR, REMAINING_LEASE_CAGR, FULL_LIFETIME_CAGR, ACQUISITION_PRICE, CURRENT_VALUE FROM cagr_metrics WHERE FULL_LIFETIME_CAGR > 0.06 ORDER BY FULL_LIFETIME_CAGR DESC"
    question: Which sale-leaseback properties exceed a 6% full lifetime CAGR target cap rate?
    verified_at: 1782952251
    verified_by: Semantic Model Generator
    use_as_onboarding_question: false
  - name: "remaining_cagr_deal_sourcing"
    sql: "SELECT PROPERTY_NAME, TENANT_NAME, REMAINING_LEASE_CAGR, YEARS_REMAINING, PROJECTED_END_VALUE FROM cagr_metrics WHERE REMAINING_LEASE_CAGR > 0.05 AND YEARS_REMAINING > 5 ORDER BY REMAINING_LEASE_CAGR DESC"
    question: What properties have remaining CAGR above 5% with more than 5 years left on the lease for deal sourcing?
    verified_at: 1782952251
    verified_by: Semantic Model Generator
    use_as_onboarding_question: false
  - name: "avg_cagr_by_property_type"
    sql: "SELECT PROPERTY_TYPE, AVG(CURRENT_CAGR) AS AVG_CURRENT_CAGR, AVG(FULL_LIFETIME_CAGR) AS AVG_FULL_CAGR, AVG(REMAINING_LEASE_CAGR) AS AVG_REMAINING_CAGR, COUNT(*) AS DEAL_COUNT FROM cagr_metrics GROUP BY PROPERTY_TYPE ORDER BY AVG_FULL_CAGR DESC"
    question: What is the average CAGR performance by property type to identify optimal investment segments?
    verified_at: 1782952251
    verified_by: Semantic Model Generator
    use_as_onboarding_question: false
  - name: "spread_above_200bps"
    sql: "SELECT PROPERTY_NAME, CURRENT_CAGR, FULL_LIFETIME_CAGR, SPREAD_VS_BENCHMARK, NOI_GROWTH_CAGR, TOTAL_RETURN_CAGR FROM cagr_metrics WHERE SPREAD_VS_BENCHMARK > 0.02 ORDER BY SPREAD_VS_BENCHMARK DESC"
    question: Which properties have a spread above 200 basis points versus benchmark for optimal cap rate targeting?
    verified_at: 1782952251
    verified_by: Semantic Model Generator
    use_as_onboarding_question: false
  - name: "top_10_lifetime_cagr"
    sql: "SELECT PROPERTY_NAME, ACQUISITION_PRICE, CURRENT_VALUE, FULL_LIFETIME_CAGR, REMAINING_LEASE_CAGR, YEARS_REMAINING, PROJECTED_END_VALUE FROM cagr_metrics ORDER BY FULL_LIFETIME_CAGR DESC LIMIT 10"
    question: What are the top 10 highest performing sale-leaseback investments by full lifetime CAGR?
    verified_at: 1782952251
    verified_by: Semantic Model Generator
    use_as_onboarding_question: false
