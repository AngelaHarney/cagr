      schema: FINANCE_CURATED
      table: CAGR_METRICS
    primary_key:
      columns:
        - PROPERTY_ID
    dimensions:
      - name: ACQUISITION_PRICE
        expr: ACQUISITION_PRICE
        data_type: "NUMBER(38,0)"
      - name: CURRENT_VALUE
        expr: CURRENT_VALUE
        data_type: "NUMBER(38,0)"
      - name: PROJECTED_END_VALUE
        expr: PROJECTED_END_VALUE
        data_type: "NUMBER(38,0)"
      - name: PROPERTY_ID
        expr: PROPERTY_ID
        data_type: VARCHAR(16777216)
      - name: PROPERTY_NAME
        expr: PROPERTY_NAME
        data_type: VARCHAR(16777216)
      - name: PROPERTY_TYPE
        expr: PROPERTY_TYPE
        data_type: VARCHAR(16777216)
      - name: TENANT_NAME
        expr: TENANT_NAME
        data_type: VARCHAR(16777216)
    facts:
      - name: CURRENT_CAGR
        expr: CURRENT_CAGR
        data_type: FLOAT
        access_modifier: public_access
      - name: FULL_LIFETIME_CAGR
        expr: FULL_LIFETIME_CAGR
