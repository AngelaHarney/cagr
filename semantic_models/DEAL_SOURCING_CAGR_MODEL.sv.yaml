        data_type: FLOAT
        access_modifier: public_access
      - name: TOTAL_LEASE_YEARS
        expr: TOTAL_LEASE_YEARS
        data_type: "NUMBER(17,6)"
        access_modifier: public_access
      - name: TOTAL_RETURN_CAGR
        expr: TOTAL_RETURN_CAGR
        data_type: FLOAT
