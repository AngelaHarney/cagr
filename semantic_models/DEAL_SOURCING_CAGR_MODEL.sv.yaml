# Semantic model for sale-leaseback deal sourcing CAGR analysis
# Co-authored with CoCo
name: DEAL_SOURCING_CAGR_MODEL
description: "Deal Sourcing Engine semantic model for sale-leaseback investment analysis. Enables business stakeholders to evaluate CAGR metrics (current, remaining lease, and full lifetime) to optimize investment volume and target desired cap rates. Supports deal pipeline decisions by comparing property performance across current growth, projected remaining lease returns, and total lifetime value creation."
