manifest_version: 2
type: DCM_PROJECT
default_target: 'DEV'

targets:
  DEV:
    project_name: 'PRECISION.CAGR.PRECISION_CALCS'
    templating_config: 'DEV'
  TST:
    project_name: 'PRECISION.CAGR.PRECISION_CALCS_TST'
    templating_config: 'TST'
  PRD:
    project_name: 'PRECISION.CAGR.PRECISION_CALCS_PRD'
    templating_config: 'PRD'

templating:
  defaults:
    env_suffix: "_DEV"
    wh_size: "XSMALL"
  configurations:
    DEV:
      env_suffix: "_DEV"
      wh_size: "XSMALL"
    TST:
      env_suffix: "_TST"
      wh_size: "SMALL"
    PRD:
      env_suffix: ""
      wh_size: "MEDIUM"
